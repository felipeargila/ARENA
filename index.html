<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<title>AI Quiz Arena</title>

<style>

body{
background:#121212;
color:white;
font-family:Arial;
text-align:center;
}

button{
padding:10px;
margin:8px;
font-size:16px;
cursor:pointer;
}

.option{
display:block;
width:300px;
margin:10px auto;
padding:12px;
background:#333;
border:none;
color:white;
}

.correct{background:green;}
.wrong{background:red;}

#timer{
font-size:22px;
margin:10px;
}

</style>

</head>

<body>

<h1>AI QUIZ ARENA</h1>

<div id="setup">

<button onclick="startGame('solo')">Modo Solo</button>

<button onclick="startGame('duelo')">Modo Duelo</button>

<br><br>

<input id="player1" placeholder="Jogador 1" value="Gepeteta">

<input id="player2" placeholder="Jogador 2" value="Mano Google">

</div>

<div id="game" style="display:none">

<h2 id="turn"></h2>

<div id="timer"></div>

<h3 id="question"></h3>

<div id="options"></div>

<br>

<button onclick="skip()">Pular</button>

<button onclick="fifty()">50/50</button>

<h3 id="score"></h3>

</div>

<script>

// BASE DE CONHECIMENTO

const politicians=[
{name:"Aécio Neves",party:"PMDB"},
{name:"Fernando Henrique",party:"MDB"},
{name:"Lula",party:"PT"}
]

const stadiums=[
{team:"Goiatuba",stadium:"Estádio Divino Garcia Rosa"},
{team:"Flamengo",stadium:"Maracanã"},
{team:"Palmeiras",stadium:"Allianz Parque"}
]

const pokemonFirst="Rhydon"

const carsWinner="Chick Hicks"

let mode
let score1=0
let score2=0
let currentPlayer=1
let currentCorrect
let timer
let time=15

function startGame(m){

mode=m

document.getElementById("setup").style.display="none"

document.getElementById("game").style.display="block"

nextQuestion()

}

function random(arr){

return arr[Math.floor(Math.random()*arr.length)]

}

function shuffle(arr){

return arr.sort(()=>Math.random()-0.5)

}

function generateQuestion(){

let type=Math.floor(Math.random()*4)

if(type===0){

let p=random(politicians)

let options=[p.party,"PSDB","PFL","PTB"]

shuffle(options)

currentCorrect=options.indexOf(p.party)

return{
text:"Qual foi o primeiro partido de "+p.name+"?",
options:options
}

}

if(type===1){

let s=random(stadiums)

let options=[s.stadium,"Mineirão","Morumbi","Serra Dourada"]

shuffle(options)

currentCorrect=options.indexOf(s.stadium)

return{
text:"Qual é o estádio do "+s.team+"?",
options:options
}

}

if(type===2){

let options=["Bulbasaur",pokemonFirst,"Mew","Pikachu"]

shuffle(options)

currentCorrect=options.indexOf(pokemonFirst)

return{
text:"Qual foi o primeiro Pokémon criado?",
options:options
}

}

if(type===3){

let options=["Relâmpago McQueen",carsWinner,"The King","Guido"]

shuffle(options)

currentCorrect=options.indexOf(carsWinner)

return{
text:"Quem venceu a Copa Pistão em Carros 1?",
options:options
}

}

}

function nextQuestion(){

let q=generateQuestion()

document.getElementById("question").innerText=q.text

let optDiv=document.getElementById("options")

optDiv.innerHTML=""

q.options.forEach((opt,i)=>{

let btn=document.createElement("button")

btn.className="option"

btn.innerText=opt

btn.onclick=()=>answer(i,btn)

optDiv.appendChild(btn)

})

startTimer()

updateUI()

}

function startTimer(){

clearInterval(timer)

time=15

timer=setInterval(()=>{

time--

document.getElementById("timer").innerText="Tempo: "+time

if(time<=0){

clearInterval(timer)

nextQuestion()

}

},1000)

}

function answer(i,btn){

clearInterval(timer)

let buttons=document.querySelectorAll(".option")

buttons.forEach(b=>b.disabled=true)

if(i===currentCorrect){

btn.classList.add("correct")

if(mode==="solo") score1++

if(mode==="duelo"){

if(currentPlayer===1) score1++
else score2++

}

}else{

btn.classList.add("wrong")

buttons[currentCorrect].classList.add("correct")

}

updateUI()

}

function updateUI(){

let p1=document.getElementById("player1").value||"Jogador1"

let p2=document.getElementById("player2").value||"Jogador2"

document.getElementById("score").innerText=p1+" "+score1+" x "+score2+" "+p2

if(mode==="duelo"){

document.getElementById("turn").innerText="Turno de "+(currentPlayer===1?p1:p2)

currentPlayer=currentPlayer===1?2:1

}

}

function skip(){

nextQuestion()

}

function fifty(){

let buttons=document.querySelectorAll(".option")

let removed=0

buttons.forEach((b,i)=>{

if(i!==currentCorrect && removed<2){

b.style.display="none"

removed++

}

})

}

</script>

</body>
</html>
